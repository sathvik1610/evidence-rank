metadata:
  version: "10.0-final"
  description: "Redrob Senior AI Engineer JD intent contract. Optimized for retrieval/ranking/search ownership, evaluation culture, product execution, and candidate hireability."
  # CRITICAL ENGINE REQUIREMENT: ALL pattern matching must be case-insensitive.
  # Skill names in the dataset use mixed casing: 'CI/CD', 'Fine-tuning LLMs', 'Embeddings',
  # 'BM25', 'FAISS', 'Pinecone' etc. A case-sensitive match will silently miss most signals.
  matching_mode: "case_insensitive_everywhere"
  #
  # PATTERN MATCH TYPES (used in extraction_rules.patterns):
  #   phrase  (default) — the full string must appear as a substring in the field text.
  #                       'hybrid search' matches 'I built a hybrid search system'.
  #   token_any         — the text is tokenized (split on spaces, hyphens, slashes, underscores).
  #                       Match fires if ANY token in the skill name equals this anchor.
  #                       'fine-tuning' matches 'Fine-tuning LLMs', 'LLM Fine-tuning', 'Fine Tuning'.
  #                       USE THIS for single-word or hyphenated anchors that appear in multi-word skill names.
  #   token_all         — same as token_any but ALL listed anchor tokens must be present.
  #                       Use for disambiguation: requires both 'retrieval' AND 'augmented' to match RAG.
  multiplier_application:
    order: "listed_order"
    combined_floor: 0.25
    floor_exempt_multiplier_ids:
      - "pure_research_penalty"
      - "consulting_heavy_soft_penalty"
      - "langchain_tourist_trap"
      - "keyword_stuffer_penalty"
      - "computer_vision_trap"
    notes: "Apply multipliers deterministically in file order. The 25% floor is only protection against accidental over-stacking of soft logistics/behavior penalties; it must not rescue profiles matching explicit JD disqualifiers."
  context_weights:
    "career_history[].description": 6
    "career_history[].title": 4
    "profile.current_title": 4
    "profile.summary": 2
    "skills[].name": 1
    "redrob_signals.skill_assessment_scores.keys": 2

# ---------------------------------------------------------
# 1. EVIDENCE EXTRACTION RULES
# ---------------------------------------------------------
extraction_rules:

  - id: "core_search_and_retrieval"
    feature_bucket: "primary_fit"
    # Skills field added: 'Vector Search', 'Embeddings', 'BM25', 'FAISS' appear as explicit
    # skill names in the dataset. A candidate with thin career descriptions but strong skill
    # signals would score 0 without this. Context weight for skills[].name is 1 (vs 6 for description).
    target_fields:
      - "career_history[].description"
      - "career_history[].title"
      - "profile.current_title"
      - "skills[].name"
      - "redrob_signals.skill_assessment_scores.keys"
    patterns:
      - "bm25"
      - "retrieval system"
      - "information retrieval"
      - "search relevance"
      - "search quality"
      - "dense retrieval"
      - "sparse retrieval"
      - "hybrid search"
      - "semantic search"
      - "vector search"
      - "candidate retrieval"
      - "query understanding"
      - "retrieval pipeline"
      - "ranking pipeline"
      - "sentence-transformers"
      - "sentence transformers"
      - "faiss"
      - "pinecone"
      - "weaviate"
      - "milvus"
      - "qdrant"
      - "elasticsearch"
      - "opensearch"
      - "lucene"
      - "solr"
      - "hnsw"
      - "bge"
      - "e5"
      - "gte"
      - "cohere embeddings"
      - "jina embeddings"
      - "openai embeddings"
      - "voyage embeddings"
      - "embedding"
      - "embeddings"
      - "embedding-based search"
      - "embedding based search"
      - "pgvector"

  - id: "semantic_recsys_and_ranking"
    feature_bucket: "primary_fit"
    target_fields:
      - "career_history[].description"
      - "career_history[].title"
      - "profile.current_title"
      - "skills[].name"
      - "redrob_signals.skill_assessment_scores.keys"
    patterns:
      - "recommendation engine"
      - "recommendation platform"
      - "recommender system"
      - "recommendation system"
      - "recommendation systems"
      - "collaborative filtering"
      - "matrix factorization"
      - "candidate matching"
      - "candidate ranking"
      - "talent matching"
      - "marketplace ranking"
      - "feed ranking"
      - "ads ranking"
      - "personalization"
      - "ranking model"
      - "ranker"
      - "embedding ranker"
      - "learning to rank"
      - "learning-to-rank"
      - "ltr model"
      - "ltr ranking"
      - "ltr system"
      - "xgboost rank"
      - "xgboost ranking"
      - "lambdamart"
      - "cross encoder"
      - "cross-encoder"
      - "two tower"
      - "two-tower"
      - "dssm"
      - "colbert"
      - "bi encoder"
      - "bi-encoder"
      - "neural ranking"
      - "reranking"
      - "re-ranking"

  - id: "evaluation_culture"
    feature_bucket: "primary_fit"
    target_fields:
      - "career_history[].description"
      - "career_history[].title"
      - "profile.current_title"
      - "profile.summary"
      - "skills[].name"
      - "redrob_signals.skill_assessment_scores.keys"
    patterns:
      - "ndcg"
      - "ndcg@"
      - "mean reciprocal rank"
      - "mrr@"
      # NOTE: "mrr" alone matches "Monthly Recurring Revenue" - use full phrase
      - "mean average precision"
      - "map@"
      # NOTE: "map" alone is too broad ("map function", "roadmap", etc.) - use full phrase
      - "precision at k"
      # NOTE: "a/b testing" alone is too broad — fires on marketing, growth, email campaigns.
      # Only use ranking/search-specific phrases. Engine must require co-occurrence with
      # core_search_and_retrieval > 0 OR semantic_recsys_and_ranking > 0 for a/b variants.
      - "ranking a/b test"
      - "search a/b test"
      - "retrieval a/b test"
      - "ranker a/b test"
      - "retrieval experiment"
      - "ranking experiment"
      - "a/b testing framework"
      - "experimentation platform"
      - "online experiments"
      - "offline benchmarks"
      - "offline evaluation"
      - "offline online evaluation"
      - "offline-online evaluation"
      - "offline online evaluation harness"
      - "offline-online evaluation harness"
      - "eval harness"
      - "evaluation harness"
      - "ranking metrics"
      - "offline metrics"
      - "online metrics"
      - "relevance labeling"
      - "human relevance"
      - "human relevance judgments"
      - "human evaluation"
      - "golden dataset"
      - "ranking benchmark"
      - "offline-to-online correlation"
      - "offline online correlation"
      - "live a/b"
      - "live a/b test"
      - "simulated a/b"
      - "simulated a/b tests"
      - "live engagement"
      - "engagement calibration"
      - "predicted what the recommendation would do"
      - "precision@k"
      - "recall@k"
      - "hit rate"
      - "hit-rate"
      - "click-through rate as proxy"
    scoring_guards:
      - applies_to_patterns:
          - "a/b testing framework"
          - "experimentation platform"
          - "online experiments"
          - "human evaluation"
          - "hit rate"
          - "hit-rate"
        require_any_feature:
          - "extracted_features.core_search_and_retrieval > 0"
          - "extracted_features.semantic_recsys_and_ranking > 0"
        note: "Generic experimentation/evaluation terms only count when anchored to search, ranking, retrieval, or recommendation work."

  - id: "tradeoff_judgment"
    feature_bucket: "product_builder"
    description: "Evidence that the candidate can reason about ranking/retrieval trade-offs from systems they built, not just list tools."
    target_fields:
      - "career_history[].description"
      - "profile.summary"
    patterns:
      - "dense vs sparse"
      - "sparse vs dense"
      - "hybrid vs dense"
      - "hybrid vs sparse"
      - "latency vs quality"
      - "quality vs latency"
      - "latency quality tradeoff"
      - "latency-quality tradeoff"
      - "offline vs online"
      - "online vs offline"
      - "offline-online tradeoff"
      - "offline to online"
      - "offline-to-online"
      - "precision vs recall"
      - "recall vs precision"
      - "precision recall tradeoff"
      - "precision-recall tradeoff"
      - "fine-tune vs prompt"
      - "fine tune vs prompt"
      - "prompt vs fine-tune"
      - "prompt vs fine tune"
      - "reranker latency"
      - "ranking latency"
      - "retrieval latency"
      - "quality regression tradeoff"
      - "relevance latency"
    scoring_guards:
      - require_any_feature:
          - "extracted_features.core_search_and_retrieval > 0"
          - "extracted_features.semantic_recsys_and_ranking > 0"
        note: "Trade-off language is valuable only when tied to retrieval, search, ranking, recommendation, or matching systems. Do not reward generic product trade-off wording by itself."


  - id: "metric_ownership"
    feature_bucket: "product_builder"
    target_fields:
      - "career_history[].description"
    patterns:
      - "ctr"
      - "conversion"
      - "engagement"
      - "retention"
      - "business metrics"
      - "lift"
      - "experiment impact"
      - "kpi"
      - "growth metric"
    scoring_guards:
      - require_any_feature:
          - "extracted_features.core_search_and_retrieval > 0"
          - "extracted_features.semantic_recsys_and_ranking > 0"
        note: "CTR/conversion/retention/KPI language is valuable only when tied to ranking, search, retrieval, or recommendation systems; otherwise it is marketing/product-management noise."

  - id: "operational_pain_and_scale"
    feature_bucket: "product_builder"
    target_fields:
      - "career_history[].description"
    patterns:
      - "schema drift"
      - "model drift"
      - "embedding drift"
      - "retrieval regression"
      - "latency regression"
      - "index refresh"
      - "index rebuild"
      - "indexing pipeline"
      - "incident response"
      - "on call"
      - "production traffic"
      - "model serving"
      - "online serving"
      - "retrieval serving"
      - "millions of users"
      - "large-scale retrieval"
      - "large-scale ranking"
      - "large-scale recommendation"
      - "p99 latency"
      - "high-traffic search"
      - "high traffic search"
      - "high-traffic recommendation"
    scoring_guards:
      - require_any_feature:
          - "extracted_features.core_search_and_retrieval > 0"
          - "extracted_features.semantic_recsys_and_ranking > 0"
          - "extracted_features.hands_on_engineering_python > 0"
        note: "Operational scale language must be technical and preferably ML/search anchored; do not let generic support, logistics, retail, or marketing operations suppress research/product penalties."

  - id: "ownership_action_verbs"
    feature_bucket: "product_builder"
    # NOTE: These patterns are only scored when co-occurring with search/ranking features.
    # In isolation they are too generic (any engineer builds things). Engine must apply
    # this bucket as a secondary signal, not a standalone score.
    target_fields:
      - "career_history[].description"
    patterns:
      - "owned end-to-end"
      - "built from scratch"
      - "led the development"
      - "drove adoption"
      - "sole owner"
      - "founding engineer"
      - "shipped to production"
      - "zero to one"
      - "v1 of"
      - "rapid iteration"
      - "prototype to production"
      - "productionized"
      - "launched v1"
      - "shipped v1"
      - "weekly iteration"
      - "week-long sprint"
    scoring_guards:
      - require_any_feature:
          - "extracted_features.core_search_and_retrieval > 0"
          - "extracted_features.semantic_recsys_and_ranking > 0"
          - "extracted_features.inferred_production_ml == 1"
        note: "Ownership/shipper verbs are secondary evidence. They should never lift generic founders, PMs, marketers, or operations profiles without relevant search/ranking/ML production evidence."

  - id: "shipper_product_engineer"
    feature_bucket: "product_builder"
    description: "Positive shipper signal from the JD: tilt toward practical product-engineering, not pure research."
    target_fields:
      - "career_history[].description"
      - "profile.summary"
    patterns:
      - "shipped"
      - "launched"
      - "productionized"
      - "from prototype to production"
      - "built and iterated"
      - "rapid iteration"
      - "real users"
      - "user feedback"
      - "feedback loop"
      - "recruiter feedback"
    scoring_guards:
      - require_any_feature:
          - "extracted_features.core_search_and_retrieval > 0"
          - "extracted_features.semantic_recsys_and_ranking > 0"
          - "extracted_features.inferred_production_ml == 1"
        note: "Do not reward generic launch/project language unless the profile also shows relevant ML/search/ranking production evidence."

  - id: "hands_on_engineering_python"
    feature_bucket: "must_have"
    # NARROWED: JD says 'Strong Python. Yes really, we care about code quality.'
    # Removed Docker, CI/CD, GitHub Actions — those are DevOps signals, not Python coding signals.
    # A DevOps engineer or CV researcher using Docker/CI-CD would incorrectly score on this bucket.
    # Docker/CI-CD can be tracked separately as infrastructure signals with lower weight.
    target_fields:
      - "career_history[].description"
      - "skills[].name"
    patterns:
      - "python"
      - "pytorch"
      - "scikit-learn"
      - "numpy"
      - "fastapi"
      - "flask"
      - "pydantic"
      - "pytest"
      - "hugging face"
      - "huggingface"
      - "transformers"
      - "weights and biases"
      - "weights & biases"

  - id: "devops_infrastructure"
    feature_bucket: "nice_to_have"
    # Separated from Python coding. Infrastructure signals indicate production discipline
    # but should not gate a Python-focused must_have bucket.
    target_fields:
      - "career_history[].description"
      - "skills[].name"
    patterns:
      - "ci/cd"
      - "github actions"
      - "docker"
      - "kubernetes"
      - "terraform"
      - "mlops"
      - "model monitoring"

  - id: "founding_startup_ambiguity"
    feature_bucket: "nice_to_have"
    target_fields:
      - "career_history[].description"
    patterns:
      - "0 to 1"
      - "greenfield"
      - "first engineer"
      - "first ml engineer"
      - "built v1"
      - "startup"
      - "seed stage"
    scoring_guards:
      - require_any_feature:
          - "extracted_features.core_search_and_retrieval > 0"
          - "extracted_features.semantic_recsys_and_ranking > 0"
          - "extracted_features.hands_on_engineering_python > 0"
        note: "Startup language is useful only as a weak context signal for relevant builders. Do not count employer funding-stage mentions alone; Redrob is Series A, and copied JD/company context is not candidate evidence."

  - id: "domain_exposure_hr_marketplace"
    feature_bucket: "nice_to_have"
    target_fields:
      - "career_history[].description"
      - "career_history[].industry"
    patterns:
      - "hr tech"
      - "recruiting"
      - "recruiter-facing"
      - "recruiter facing"
      - "recruiter search"
      - "recruiter workflow"
      - "hiring workflow"
      - "talent acquisition"
      - "talent marketplace"
      - "applicant tracking"
      - "ats"
      - "candidate matching"
      - "candidate search"
      - "candidate ranking"
      - "candidate-jd matching"
      - "job search"
      - "job marketplace"
      - "gig marketplace"
      - "staffing"
      - "talent platform"

  - id: "recruiter_product_workflow_ownership"
    feature_bucket: "nice_to_have"
    description: "Mild positive signal for product-minded ownership of recruiter/candidate workflows, especially when connected to search, matching, or relevance quality."
    target_fields:
      - "career_history[].description"
      - "profile.summary"
    patterns:
      - "recruiter workflow"
      - "recruiter-facing search"
      - "recruiter facing search"
      - "recruiter feedback loop"
      - "recruiter engagement"
      - "recruiter response rate"
      - "candidate discovery"
      - "candidate-job matching"
      - "candidate jd matching"
      - "job-candidate matching"
      - "job candidate matching"
      - "hiring workflow"
      - "talent intelligence"
      - "talent marketplace quality"
      - "marketplace relevance"
      - "matching quality"
      - "search quality for recruiters"
      - "relevance tuning"
    scoring_guards:
      - require_any_feature:
          - "extracted_features.core_search_and_retrieval > 0"
          - "extracted_features.semantic_recsys_and_ranking > 0"
          - "extracted_features.inferred_production_ml == 1"
        note: "Recruiter/product workflow language is a mild tie-breaker. It should not lift generic HR, recruiting, or product-management profiles without relevant technical evidence."


  - id: "llm_fine_tuning"
    feature_bucket: "nice_to_have"
    # LEXICAL VARIATION PROBLEM: The dataset has 'Fine-tuning LLMs', 'LLM Fine-tuning', 'LoRA', 'QLoRA'
    # as distinct skill name strings. Phrase matching fails when word order or plurality differs.
    # SOLUTION: Use token_any match_type on skills[].name — tokenizes the skill name and checks
    # if any anchor token is present. 'fine-tuning' fires on all variants.
    # Description field still uses default phrase matching (full phrases are reliable there).
    target_fields:
      - field: "career_history[].description"
        match_type: phrase
      - field: "skills[].name"
        match_type: token_any  # 'fine-tuning' matches 'Fine-tuning LLMs', 'LLM Fine-tuning' etc.
    patterns:
      # NOTE on 'lora': token_any on skills[].name could match 'Lora' as a name in edge cases.
      # Guard: only count lora match if the full skill name also contains 'llm', 'fine-tuning',
      # 'peft', or 'qlora'. Engine must apply this co-occurrence check for lora token specifically.
      - "lora"          # token_any + co-occurrence guard: matches 'LoRA', 'QLoRA fine-tuning with LoRA'
      - "qlora"         # token_any: matches 'QLoRA'
      - "peft"          # token_any: matches 'PEFT', 'PEFT fine-tuning'
      - "fine-tuning"   # token_any: matches 'Fine-tuning LLMs', 'LLM Fine-tuning', 'Fine Tuning'
      - "finetuning"    # token_any: covers the no-hyphen spelling
      - "rlhf"
      - "dpo"
      - "sft"
      - "instruction tuning"
      - "llm fine-tuning"  # phrase fallback for descriptions

  - id: "distributed_systems_and_inference"
    feature_bucket: "nice_to_have"
    target_fields:
      - "career_history[].description"
      - "skills[].name"
    patterns:
      - "distributed systems"
      - "inference optimization"
      - "tensorrt"
      - "vllm"
      - "triton"
      - "model serving"
      - "latency optimization"
      - "high throughput"

# ---------------------------------------------------------
# 1.6 CONCEPT INFERENCE RULES
# Solves the semantic equivalence problem: a candidate doing X may not use the word X.
# These rules fire when component signals co-occur, inferring the higher-level concept.
# Engine runs these AFTER extraction_rules, using their output as inputs.
# Produces additional extracted_features.* flags (boolean: 0 or 1).
# ---------------------------------------------------------
concept_inference:

  - id: "inferred_rag_practitioner"
    produces: "extracted_features.inferred_rag_practitioner"
    description: |
      Candidate is likely building RAG systems without using the term 'RAG'.
      RAG = retrieval component + vector/embedding store + LLM generation.
      This fires when all three components are evidenced, even if 'RAG' never appears.
    requires_all:
      - extracted_features.core_search_and_retrieval > 0   # retrieval component
      - extracted_features.hands_on_engineering_python > 0 # LLM tooling (hugging face, transformers etc.)
    requires_any_one:
      - field: "skills[].name OR career_history[].description"
        contains_any: ["llm", "openai", "gpt", "claude", "gemini", "anthropic",
                       "language model", "generation", "chatbot", "question answering"]
    value_if_true: 1
    value_if_false: 0
    note: "Use this to rescue candidates who describe RAG work without the label."

  - id: "inferred_production_ml"
    produces: "extracted_features.inferred_production_ml"
    description: |
      Candidate has shipped ML to production without necessarily using ops jargon.
      Signals: model endpoint + monitoring + real users. Not the same as 'studied ML'.
    requires_all:
      - extracted_features.hands_on_engineering_python > 0
    requires_any_feature:
      - extracted_features.core_search_and_retrieval > 0
      - extracted_features.semantic_recsys_and_ranking > 0
      - extracted_features.llm_fine_tuning > 0
    requires_any_one:
      - field: "career_history[].description"
        contains_any: ["production model", "model endpoint", "ml endpoint",
                       "real users", "live traffic", "model in production", "shipped model",
                       "inference service", "online serving", "model serving",
                       "deployed ranking", "deployed retrieval", "deployed recommendation"]
    value_if_true: 1
    value_if_false: 0
    note: "Avoid treating generic backend deployment/API work as production ML unless an ML/search/ranking signal is also present."

  - id: "inferred_eval_practitioner"
    produces: "extracted_features.inferred_eval_practitioner"
    description: |
      Candidate runs rigorous evaluation without using metric names like NDCG.
      Signals: comparing approaches, holdout sets, measuring quality, business impact correlation.
    requires_any_feature:
      - extracted_features.core_search_and_retrieval > 0
      - extracted_features.semantic_recsys_and_ranking > 0
      - extracted_features.evaluation_culture > 0
    requires_any_one:
      - field: "career_history[].description"
        contains_any: ["holdout set", "test set", "baseline comparison", "measured improvement",
                       "compared approaches", "quality metrics", "regression testing",
                       "before and after", "ablation", "benchmark", "ground truth"]
    value_if_true: 1
    value_if_false: 0
    note: "Supplements evaluation_culture. A good engineer may describe eval rigorously without naming NDCG."

  - id: "inferred_keyword_stuffer"
    produces: "extracted_features.inferred_keyword_stuffer"
    description: |
      Skills list has high AI keyword density but career descriptions have zero substance.
      Classic trap in this dataset: marketing/ops titles with advanced AI skills listed.
    formula: |
      IF computed.ai_skill_count >= 5
      AND extracted_features.core_search_and_retrieval == 0
      AND extracted_features.operational_pain_and_scale == 0
      AND extracted_features.metric_ownership == 0
      AND profile.current_title does NOT match_any [engineer, developer]
      THEN inferred_keyword_stuffer = 1
    value_if_true: 1
    value_if_false: 0
    note: "Feeds keyword_stuffer_penalty. Stricter than skill_inflation_check; research/science titles still need evidence in career history, not just skill keywords."

# ---------------------------------------------------------
# 1.5 COMPUTED FIELDS (Engine Pre-Processing)
# Run these before hard_filters and multipliers.
# All fields produced here are available as computed.* or extracted_* in subsequent rules.
# ---------------------------------------------------------
computed_fields:

  - id: "computed.days_since_active"
    description: "Days elapsed since the candidate was last active on the platform."
    inputs:
      - "redrob_signals.last_active_date"
    formula: "(current_date - last_active_date).days"
    type: integer
    fallback: null  # If last_active_date is missing, skip rules that depend on this field.

  - id: "computed.avg_tenure_months"
    description: "Average tenure across all past (non-current) roles, in months."
    inputs:
      - "career_history[].duration_months"
      - "career_history[].is_current"
    formula: "mean(duration_months for roles where is_current == false)"
    type: float
    fallback: null  # If only one role total (current), skip job_hopper_risk rule.
    notes: "Exclude the current role — its duration_months is still accumulating and not a reliable tenure signal."

  - id: "computed.career_history_count"
    description: "Total number of career history entries (current + past)."
    inputs:
      - "career_history"
    formula: "len(career_history)"
    type: integer
    fallback: 0

  - id: "computed.ai_skill_count"
    description: "Count of skills in skills[].name that match a curated AI/ML keyword list."
    inputs:
      - "skills[].name"
    formula: "count(skills where lowercase(name) matches any keyword in ai_keyword_list)"
    type: integer
    fallback: 0
    ai_keyword_list:
      - "pytorch"
      - "tensorflow"
      - "scikit-learn"
      - "nlp"
      - "llm"
      - "langchain"
      - "openai"
      - "hugging face"
      - "huggingface"
      - "transformers"
      - "diffusion"
      - "rag"
      - "vector database"
      - "embeddings"
      - "computer vision"
      - "opencv"
      - "cnn"
      - "gans"
      - "reinforcement learning"
      - "xgboost"
      - "bert"
      - "gpt"
      - "stable diffusion"
      - "image classification"
      - "object detection"
      - "recommendation systems"
      - "information retrieval"

  - id: "computed.verified_relevant_assessment_count"
    description: "Count of Redrob-assessed relevant ML/search/ranking skills with score >= 70."
    inputs:
      - "redrob_signals.skill_assessment_scores"
    formula: "count(skill_assessment_scores where score >= 70 and lowercase(skill_name) matches any keyword in relevant_assessment_keyword_list)"
    type: integer
    fallback: 0
    relevant_assessment_keyword_list:
      - "information retrieval"
      - "search"
      - "ranking"
      - "recommendation"
      - "recommender"
      - "nlp"
      - "embeddings"
      - "vector search"
      - "llm"
      - "fine-tuning"
      - "python"
      - "pytorch"
      - "machine learning"
    notes: "Verified assessments are stronger than self-reported skills, but only high scores on relevant skills should help."

  - id: "computed.relevant_skill_depth_count"
    description: "Count of relevant skills with sustained usage and non-beginner proficiency."
    inputs:
      - "skills[].name"
      - "skills[].proficiency"
      - "skills[].duration_months"
      - "skills[].endorsements"
    formula: "count(skills where relevant name match AND duration_months >= 24 AND proficiency in ['advanced','expert'] AND endorsements >= 10)"
    type: integer
    fallback: 0
    relevant_skill_keyword_list:
      - "information retrieval"
      - "search"
      - "ranking"
      - "recommendation"
      - "recommender"
      - "embeddings"
      - "vector"
      - "bm25"
      - "faiss"
      - "pinecone"
      - "qdrant"
      - "milvus"
      - "weaviate"
      - "opensearch"
      - "elasticsearch"
      - "python"
      - "pytorch"
      - "llm"
      - "fine-tuning"
    notes: "Prevents treating a 2-month beginner skill the same as multi-year applied practice."

  - id: "computed.recent_ai_skill_only"
    description: "Flags profiles whose AI story is mostly recent self-reported skills, with no career-history evidence."
    inputs:
      - "skills[].name"
      - "skills[].duration_months"
      - "career_history[].description"
    formula: |
      true if ai_skill_count >= 3
      AND max(duration_months for AI/ML skills) < 12
      AND extracted_features.core_search_and_retrieval == 0
      AND extracted_features.semantic_recsys_and_ranking == 0
      AND extracted_features.inferred_production_ml == 0
    type: boolean
    fallback: false
    notes: "JD warns against recent framework/LLM tourists unless there is older production ML evidence."

  - id: "computed.title_velocity_risk"
    description: "Flags title-chaser pattern closer to the JD language than tenure alone."
    inputs:
      - "career_history[].title"
      - "career_history[].duration_months"
    formula: "career_history_count >= 4 AND distinct seniority/title bands >= 4 AND computed.avg_tenure_months < 24"
    type: boolean
    fallback: false
    notes: "Complements job_hopper_risk by detecting rapid Senior/Staff/Principal-style title movement."

  - id: "computed.career_yoe_years"
    description: "Years of experience estimated from career_history durations."
    inputs:
      - "career_history[].duration_months"
    formula: "sum(duration_months for all roles) / 12.0"
    type: float
    fallback: null

  - id: "computed.yoe_claim_mismatch"
    description: "Self-reported YOE differs materially from career-history duration."
    inputs:
      - "profile.years_of_experience"
      - "computed.career_yoe_years"
    formula: "abs(profile.years_of_experience - computed.career_yoe_years) > 2.0"
    type: boolean
    fallback: false

  - id: "extracted_product_company_ratio"
    description: "Fraction of total career months spent at product companies (vs consulting/services)."
    inputs:
      - "career_history[].duration_months"
      - "career_history[].industry"
      - "career_history[].company_size"
      - "career_history[].company"
    formula: |
      consulting_companies = ['TCS', 'Infosys', 'Wipro', 'Accenture', 'Cognizant',
                              'Capgemini', 'HCL', 'Tech Mahindra', 'Mphasis', 'Hexaware']
      consulting_months = sum(duration_months for roles where
          company in consulting_companies OR
          (industry == 'IT Services' AND company_size == '10001+'))
      total_months = sum(duration_months for all roles)
      ratio = (total_months - consulting_months) / total_months  [0.0 to 1.0]
    type: float
    fallback: 0.5  # If industry/company data is missing, assume mixed background (fail open).
    notes: "Value of 0.0 means entire career is consulting/services. Triggers consulting_heavy_soft_penalty."

# ---------------------------------------------------------
# 2. HARD DISQUALIFIERS
# ---------------------------------------------------------
hard_filters:

  - id: "ghost_profile"
    # FIELD NOTE: Schema has 'last_active_date' (ISO date string), NOT 'last_active_days_ago'.
    # Engine must compute: days_since_active = (today - last_active_date).days
    # and use that computed value. Do NOT read 'last_active_days_ago' directly - it does not exist.
    # All four conditions must be true. Dropping any one creates false ghosts:
    # A candidate who is inactive but still submitting applications is passively searching, not dormant.
    logic_operator: "AND"
    conditions:
      - field: "computed.days_since_active"
        operator: ">"
        value: 365

      - field: "redrob_signals.recruiter_response_rate"
        operator: "<"
        value: 0.05

      - field: "redrob_signals.open_to_work_flag"
        operator: "=="
        value: false

      - field: "redrob_signals.applications_submitted_30d"
        operator: "=="
        value: 0

# ---------------------------------------------------------
# 3. MULTIPLIERS
# ---------------------------------------------------------
multipliers:

  - id: "co_occurrence_bonus_retrieval_and_eval"
    # Fires only when retrieval+eval are present but ranking signal is absent.
    # Superseded by trifecta_bonus when all three are evidenced.
    # MUTUALLY EXCLUSIVE with trifecta_bonus — guard on semantic_recsys_and_ranking == 0
    # prevents stacking. Trifecta (3 signals) ×1.15 always beats this (2 signals) ×1.05.
    logic_operator: "AND"
    conditions:
      - field: "extracted_features.core_search_and_retrieval"
        operator: ">"
        value: 0
      - field: "extracted_features.evaluation_culture"
        operator: ">"
        value: 0
      - field: "extracted_features.semantic_recsys_and_ranking"
        operator: "=="
        value: 0  # Prevents stacking — trifecta takes over when this is > 0
    multiplier_value: 1.05

  - id: "trifecta_bonus_retrieval_ranking_eval"
    # Best candidates show all three: retrieval depth + ranking sophistication + eval rigor.
    # This is the profile the JD is explicitly looking for.
    # HIGHER bonus than co_occurrence: 3-signal achievement should always outrank 2-signal.
    # Mutually exclusive with co_occurrence_bonus (see above).
    logic_operator: "AND"
    conditions:
      - field: "extracted_features.core_search_and_retrieval"
        operator: ">"
        value: 0
      - field: "extracted_features.semantic_recsys_and_ranking"
        operator: ">"
        value: 0
      - field: "extracted_features.evaluation_culture"
        operator: ">"
        value: 0
    multiplier_value: 1.15

  - id: "job_market_activity_bonus"
    # FIELD NOTE: 'last_active_days_ago' does not exist in schema.
    # Engine computes 'computed.days_since_active' from redrob_signals.last_active_date.
    logic_operator: "AND"
    conditions:
      - field: "redrob_signals.open_to_work_flag"
        operator: "=="
        value: true

      - field: "computed.days_since_active"
        operator: "<="
        value: 30

      - field: "redrob_signals.applications_submitted_30d"
        operator: ">"
        value: 0
    multiplier_value: 1.05

  - id: "consulting_heavy_soft_penalty"
    # IMPORTANT: 'extracted_product_company_ratio' is a COMPUTED field.
    # The engine must compute this as: (months at product companies) / (total career months).
    # Company types to classify as 'product': SaaS, marketplace, consumer tech, fintech, edtech.
    # Company types to classify as 'consulting': TCS, Infosys, Wipro, Accenture, Cognizant,
    # Capgemini, HCL, Tech Mahindra, and any company where industry == 'IT Services'
    # with company_size > 10000 is a strong heuristic proxy.
    # If this field cannot be computed, skip this multiplier (fail open, not closed).
    # JD names 6 firms explicitly: TCS, Infosys, Wipro, Accenture, Cognizant, Capgemini.
    # Fires only at product_ratio == 0.0 (entire career at consulting/services).
    # JD escape clause: "If you're currently at one of these companies but have prior
    # product-company experience, that's fine." So ratio > 0.0 does not trigger this rule.
    logic_operator: "AND"
    conditions:
      - field: "extracted_product_company_ratio"
        operator: "=="
        value: 0.0
    multiplier_value: 0.40

  - id: "job_hopper_risk"
    # COMPUTED FIELDS: Both fields below must be derived by the engine before this rule fires.
    # 'computed.avg_tenure_months' = mean(career_history[].duration_months)
    #   - Exclude current role from average (duration_months is still accumulating).
    #   - If career_history has only 1 entry, skip this rule entirely (insufficient data).
    # 'computed.career_history_count' = len(career_history)
    logic_operator: "AND"
    conditions:
      - field: "computed.avg_tenure_months"
        operator: "<"
        value: 18.0

      - field: "computed.career_history_count"
        operator: ">="
        value: 3
    multiplier_value: 0.85

  - id: "title_velocity_risk"
    # JD-specific title-chaser pattern: rapid title progression across many roles.
    logic_operator: "AND"
    conditions:
      - field: "computed.title_velocity_risk"
        operator: "=="
        value: true
    multiplier_value: 0.80

  - id: "code_stopped_architect"
    logic_operator: "AND"
    conditions:
      - field: "profile.current_title"
        operator: "matches_none_ignorecase"
        value:
          - "engineer"
          - "developer"

      - field: "profile.current_title"
        operator: "matches_any_ignorecase"
        value:
          - "architect"
          - "director"
          - "vp"
          - "cto"
          - "chief technology officer"
          - "head of"
          - "engineering manager"
          - "principal"
          - "staff"

      - field: "profile.years_of_experience"
        operator: ">"
        value: 8.0

      - field: "extracted_features.hands_on_engineering_python"
        operator: "=="
        value: 0
    multiplier_value: 0.75

  - id: "recent_ai_skill_only_penalty"
    # Penalizes recent self-reported AI skill accumulation without career-history evidence
    # of production ML/retrieval/ranking. This matches the JD's LangChain-tourist warning
    # without rejecting real engineers who have older production ML experience.
    logic_operator: "AND"
    conditions:
      - field: "computed.recent_ai_skill_only"
        operator: "=="
        value: true
    multiplier_value: 0.60

  - id: "langchain_tourist_trap"
    logic_operator: "AND"
    conditions:
      - field: "skills[].name"
        operator: "matches_any_ignorecase"
        value:
          - "langchain"
          - "prompt engineering"
          - "openai"
          - "chatgpt"
          - "rag"

      - field: "extracted_features.core_search_and_retrieval"
        operator: "=="
        value: 0

      - field: "extracted_features.semantic_recsys_and_ranking"
        operator: "=="
        value: 0
    multiplier_value: 0.50

  - id: "keyword_stuffer_penalty"
    logic_operator: "AND"
    conditions:
      - field: "extracted_features.inferred_keyword_stuffer"
        operator: "=="
        value: 1
    multiplier_value: 0.55

  - id: "computer_vision_trap"
    logic_operator: "AND"
    conditions:
      - field: "skills[].name"
        operator: "matches_any_ignorecase"
        value:
          - "computer vision"
          - "opencv"
          - "cnn"
          - "image classification"
          - "object detection"
          - "robotics"
          - "speech recognition"
      - field: "extracted_features.core_search_and_retrieval"
        operator: "=="
        value: 0
      - field: "extracted_features.semantic_recsys_and_ranking"
        operator: "=="
        value: 0
    multiplier_value: 0.60

  - id: "pure_research_penalty"
    # CALIBRATED: Raised from ×0.70 to ×0.20.
    # The JD uses the strongest disqualifier language for pure-research-only profiles:
    # "We will not move forward. We are explicit about this. We've tried it twice."
    # ×0.70 left pure-research candidates at 70% score — still reachable in top 100.
    # ×0.20 makes them effectively unreachable when there is no production evidence.
    # IMPORTANT: Do not penalize research-titled candidates merely for having research titles.
    # Penalize only when they lack production ML/search evidence, operational ownership, and
    # product metric ownership. This prevents false negatives for research engineers who later
    # shipped real retrieval/ranking systems.
    logic_operator: "AND"
    conditions:
      - field: "profile.current_title"
        operator: "matches_any_ignorecase"
        value:
          - "research assistant"
          - "phd researcher"
          - "postdoctoral"
          - "graduate research"
          - "research scientist"
          - "ml researcher"
          - "research engineer"
          - "scientist"
      - field: "extracted_features.inferred_production_ml"
        operator: "=="
        value: 0
      - field: "extracted_features.operational_pain_and_scale"
        operator: "=="
        value: 0
      - field: "extracted_features.metric_ownership"
        operator: "=="
        value: 0
    multiplier_value: 0.20

  - id: "closed_source_isolation"
    # Only penalize when github score is explicitly 0 (present but empty).
    # score == -1 means missing/not connected; do NOT penalize missing data.
    # EXCEPTION: suppress penalty if career_history descriptions mention papers, arXiv,
    # conferences (NeurIPS, ICML, ICLR, SIGIR, ACL, EMNLP, NAACL), talks, or publications.
    # The JD lists 'papers, talks, open-source' as equivalent external validation.
    # GitHub is only one of three listed alternatives — do not over-index on it.
    logic_operator: "AND"
    conditions:
      - field: "profile.years_of_experience"
        operator: ">"
        value: 5.0
      - field: "redrob_signals.github_activity_score"
        operator: "=="
        value: 0
      # Exception: candidate has papers/talks/open-source in career history → skip penalty
      - field: "career_history[].description"
        operator: "matches_none_ignorecase"
        value:
          - "published"
          - "arxiv"
          - "conference"
          - "neurips"
          - "icml"
          - "iclr"
          - "sigir"
          - "acl"
          - "emnlp"
          - "naacl"
          - "talk"
          - "keynote"
          - "paper"
          - "open source"
          - "open-source"
    multiplier_value: 0.80

  - id: "skill_inflation_check"
    # COMPUTED FIELD: 'computed.ai_skill_count' does not exist in schema.
    # Engine must count skills[].name that match a predefined AI keyword list:
    # ['pytorch', 'tensorflow', 'scikit-learn', 'nlp', 'llm', 'langchain', 'openai',
    #  'hugging face', 'transformers', 'diffusion', 'rag', 'vector', 'embedding',
    #  'computer vision', 'opencv', 'cnn', 'gans', 'reinforcement learning', 'xgboost',
    #  'bert', 'gpt', 'stable diffusion', 'image classification', 'object detection']
    logic_operator: "AND"
    conditions:
      - field: "computed.ai_skill_count"
        operator: ">"
        value: 5

      - field: "extracted_features.core_search_and_retrieval"
        operator: "=="
        value: 0

      - field: "extracted_features.semantic_recsys_and_ranking"
        operator: "=="
        value: 0

      - field: "extracted_features.evaluation_culture"
        operator: "=="
        value: 0
    multiplier_value: 0.80

  - id: "yoe_claim_mismatch_penalty"
    logic_operator: "AND"
    conditions:
      - field: "computed.yoe_claim_mismatch"
        operator: "=="
        value: true
    multiplier_value: 0.90

  - id: "seniority_sweet_spot"
    # Prefer computed.career_yoe_years when available; otherwise fall back to
    # profile.years_of_experience. The JD range is a preference, not a hard cutoff.
    logic_operator: "EVAL_BAND"
    field_preference:
      - "computed.career_yoe_years"
      - "profile.years_of_experience"
    bands:
      - min: 5.0
        max: 9.9
        multiplier: 1.00

      - min: 4.0
        max: 4.9
        multiplier: 0.95

      - min: 10.0
        max: 12.9
        multiplier: 0.95

      - min: 0.0
        max: 3.9
        multiplier: 0.75

      - min: 13.0
        max: 99.0
        multiplier: 0.90

  - id: "location_tier_multiplier"
    logic_operator: "EVAL_LOCATION"
    bands:
      - condition: "profile.location matches_any ['Pune','Noida','Gurgaon','Gurugram','Delhi','Delhi NCR','New Delhi','Faridabad','Ghaziabad']"
        multiplier: 1.00

      - condition: "profile.location matches_any ['Hyderabad','Mumbai'] OR redrob_signals.willing_to_relocate == True"
        multiplier: 0.98

      - condition: "profile.country != 'India'"
        multiplier: 0.90

  - id: "notice_period_multiplier"
    logic_operator: "EVAL_BAND"
    bands:
      - min: 0
        max: 30
        multiplier: 1.00

      - min: 31
        max: 60
        multiplier: 0.95

      - min: 61
        max: 90
        multiplier: 0.90

      - min: 91
        max: 999
        multiplier: 0.75

# ---------------------------------------------------------
# 4. ADDITIVE TIE BREAKERS
# ---------------------------------------------------------
additive_tie_breakers:

  - id: "open_source_validation"
    logic_operator: "AND"
    conditions:
      - field: "redrob_signals.github_activity_score"
        operator: ">"
        value: 50
    bonus_value: 0.03

  - id: "verified_relevant_assessment"
    logic_operator: "AND"
    conditions:
      - field: "computed.verified_relevant_assessment_count"
        operator: ">="
        value: 1
    bonus_value: 0.03

  - id: "deep_relevant_skill_practice"
    logic_operator: "AND"
    conditions:
      - field: "computed.relevant_skill_depth_count"
        operator: ">="
        value: 2
      - field: "extracted_features.core_search_and_retrieval"
        operator: ">"
        value: 0
    bonus_value: 0.02

  - id: "stable_product_tenure"
    logic_operator: "AND"
    conditions:
      - field: "computed.avg_tenure_months"
        operator: ">="
        value: 30.0
      - field: "extracted_product_company_ratio"
        operator: ">="
        value: 0.5
    bonus_value: 0.02

  - id: "serious_candidate_activity"
    logic_operator: "AND"
    conditions:
      - field: "redrob_signals.interview_completion_rate"
        operator: ">="
        value: 0.80
      - field: "redrob_signals.recruiter_response_rate"
        operator: ">="
        value: 0.30
    bonus_value: 0.02

  - id: "tier1_cs_ml_education_tiebreaker"
    # Tiny tiebreaker only. The JD values shipped production systems far above pedigree.
    logic_operator: "AND"
    conditions:
      - field: "education[].tier"
        operator: "matches_any_ignorecase"
        value:
          - "tier_1"
      - field: "education[].field_of_study"
        operator: "matches_any_ignorecase"
        value:
          - "computer science"
          - "computer engineering"
          - "machine learning"
          - "artificial intelligence"
          - "data science"
    bonus_value: 0.01

  - id: "profile_authenticity_score"
    logic_operator: "AND"
    conditions:
      - field: "redrob_signals.verified_email"
        operator: "=="
        value: true

      - field: "redrob_signals.verified_phone"
        operator: "=="
        value: true

      - field: "redrob_signals.profile_completeness_score"
        operator: ">"
        value: 80.0
    bonus_value: 0.02

  - id: "linkedin_connected_minor_signal"
    logic_operator: "AND"
    conditions:
      - field: "redrob_signals.linkedin_connected"
        operator: "=="
        value: true
    bonus_value: 0.005
