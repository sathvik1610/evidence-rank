ai_usage_summary: |
  Used the Antigravity IDE agent for architectural planning and code generation. Used OpenAI Codex to evaluate the ranking heuristics, debug errors, and ensure hackathon compliance.

methodology_summary: |
  A robust offline-online ranking architecture designed for sub-5-second CPU inference.
  Offline Phase (GPU): Encodes candidates using BGE-M3 (dense FAISS + sparse CSR matrix) alongside lexical BM25. It fuses these 5 signals using Reciprocal Rank Fusion (RRF) to retrieve the top 5000 candidates. Handcrafted semantic features and BGE cross-encoder scores are precomputed for this pool.
  Online Phase (CPU): Executes purely in Python/Polars. Vectorized Core Scoring evaluates Must-Haves, Nice-to-Haves, and Product Builder heuristics. A strict set of behavioral modifiers (e.g., notice periods) are applied to the top 500. Finally, hallucination-free reasoning is generated from actual profile snippets for the top 100.

