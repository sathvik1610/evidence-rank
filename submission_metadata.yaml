ai_usage_summary: |
  Used Antigravity IDE, Claude, and ChatGPT for architecture discussions/corrections, planning phases,
  code review, and running deep-dive manual audits on code quality. 
  Used Codex to help tune behavioral modifier weights and penalty combinations based on manual evaluation.
  All core engineering logic, phase design, and implementation decisions were made by the team.
  No candidate data was fed to any external LLM APIs; the reasoning generation is strictly factual and rule-based.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Two-stage pipeline: offline precompute (no time limit) + runtime ranking (≤5 min CPU).

  Offline: BAAI/bge-m3 encodes 100K candidate profiles into dense FAISS index and
  learned-sparse CSR matrix. Three JD query vectors (skills + two HyDE personas) enable
  high-recall Reciprocal Rank Fusion (RRF) over FAISS, CSR dot-product, BM25,
  and exact/regex rescue signals. Top retrieval candidates get rule-based feature extraction (Bucket A: IR/search skills,
  Bucket B: career quality + product company ratio + shipper signals, Bucket C: gaps).
  bge-reranker-v2-m3 cross-encoder scores the widened pool offline. The current CE artifact
  covers all 12,567 retrieval-pool candidates; it was produced in three non-overlapping parts
  and merged before global rank-time normalization.
  Honeypot and ghost detection uses structural contradiction rules (impossible timelines,
  repeated copied role descriptions, zero-duration expert claims) using only candidate data.

  Runtime: Parquet artifacts load quickly. Weighted scoring formula (55% must-haves,
  25% product-builder, 15% career quality, 5% nice-to-haves) produces a 0-100 core score.
  Cross-encoder (32% weight) refines top candidates while the handcrafted score keeps JD-specific
  trust, behavior, product-company, and logistics signals dominant. A lightweight full-profile runtime
  calibration pass checks current/recent full-plan JD fit and current services context for the final slice.
  Behavioral multipliers apply reachability, notice-period penalties, location adjustments,
  hard-gate scoring for true JD disqualifiers, and bounded social proof. Submitted scores are
  fixed-scale monotonic display values derived from the internal final score, while rank order
  is assigned from the internal score. Reason generator assembles evidence-grounded sentences
  from precomputed facts — no hallucinations.

