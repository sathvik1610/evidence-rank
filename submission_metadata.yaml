# ============================================================================
# Approach summary (≤200 words — recommended for Stage 4 review)
# ============================================================================
methodology_summary: |
  Two-stage pipeline: offline precompute (no time limit) + runtime ranking (≤5 min CPU).

  Offline: BAAI/bge-m3 encodes 100K candidate profiles into dense FAISS index and
  learned-sparse CSR matrix. Three JD query vectors (skills + two HyDE personas) enable
  5-way Reciprocal Rank Fusion (RRF) over FAISS, CSR dot-product, and BM25.
  Top-5000 RRF candidates get rule-based feature extraction (Bucket A: IR/search skills,
  Bucket B: career quality + product company ratio + shipper signals, Bucket C: gaps).
  bge-reranker-v2-m3 cross-encoder scores all 5000 offline.
  Honeypot and ghost detection uses structural contradiction rules (impossible timelines,
  tech claimed before release dates, zero-duration expert claims).

  Runtime: Parquet artifacts load in <5s. Weighted scoring formula (55% must-haves,
  20% product-builder, 15% career quality, 10% nice-to-haves) produces a 0-100 core score.
  Cross-encoder (20% weight) refines top candidates. Behavioral multipliers apply
  reachability, notice-period, and location adjustments. Reason generator assembles
  evidence-grounded sentences from precomputed facts — no hallucinations.

