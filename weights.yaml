# weights.yaml — All tunable scoring weights, multipliers, boosts, and thresholds.
#
# Rules:
#   - Every numeric value in scorer.py / behavioral.py must come from here.
#   - Python code reads this file at startup via src/weights.py (weights_loader).
#   - To tune without touching Python: edit this file, re-run rank.py.
#   - Do NOT put structural constants here (batch sizes, file paths, model IDs).
#     Those live in constants.py.
#
# Version: 1.1.0 (wired — all values now actually consumed by code)

# ---------------------------------------------------------------------------
# Phase 4 — Core Scoring weights
# Must sum to 1.0 across the four buckets.
# ---------------------------------------------------------------------------
scoring:
  must_have_weight:       0.55   # Bucket A: IR/search/vector/python evidence
  nice_to_have_weight:    0.10   # Bucket A: LTR, LLM, distributed, HR-tech
  career_quality_weight:  0.15   # Bucket B: recency, depth, domain quality
  product_builder_weight: 0.20   # Bucket B: product-company + shipper composite

  # Must-Have sub-weights (must sum to 0.80 — the normalization denominator)
  must_have_sub:
    retrieval_weight:      0.25  # Core IR / search / dense retrieval evidence
    vectordb_weight:       0.20  # Vector DB / hybrid search evidence
    sys_experience_weight: 0.20  # Recsys / matching / feed-ranking systems
    eval_weight:           0.10  # Evaluation culture (NDCG / MRR / A-B testing)
    python_weight:         0.05  # Python engineering evidence

  # Nice-to-Have sub-weights (must sum to 0.10 — the normalization denominator)
  nice_to_have_sub:
    ltr_weight:            0.04  # Learning to rank / XGBoost / LambdaMART
    llm_weight:            0.03  # LLM fine-tuning / RAG / HuggingFace
    distributed_weight:    0.02  # Distributed systems / inference optimization
    hr_tech_weight:        0.01  # HR-tech / recruiting marketplace exposure

  # Career Quality sub-weights (must sum to 0.15 — the normalization denominator)
  career_quality_sub:
    sys_experience_weight: 0.08  # Built the right kind of systems (recsys/search)
    recency_weight:        0.04  # Most recent role in a relevant domain
    depth_weight:          0.03  # IR/retrieval evidence across multiple roles

  # Product Builder sub-weights (already normalised inside Bucket B to [0, 1])
  product_builder_sub:
    product_ratio_weight:  0.35  # Time-weighted product-company career fraction
    deploy_signal_weight:  0.30  # Production / scale deployment language density
    shipper_ratio_weight:  0.20  # Shipper vs researcher vocabulary ratio
    ownership_weight:      0.15  # End-to-end ownership / startup language

  # Softened hard cap: if zero retrieval + zero vector_db + zero sys_experience,
  # cap must_have_raw at this fraction before normalisation
  no_retrieval_cap: 0.50

  # Assessment bonus — added to Bucket A scores when skill has high assessment score
  assessment_bonus_threshold: 70    # assessment score >= this to trigger bonus
  assessment_bonus_value:     0.5   # fractional bonus added to bucket A evidence value

  # Cross-Encoder merge at Phase 4
  cross_encoder_weight:   0.20   # CE score contribution (0.0 to disable)
  handcrafted_weight:     0.80   # Handcrafted core score contribution (must + CE = 1.0)

# ---------------------------------------------------------------------------
# Phase 4 — Career quality multipliers (applied inside career_quality_raw)
# Penalty applied once in Phase 4, and once again in Phase 5 soft_penalties
# (double-layer is intentional per plan — Phase 4 penalises the career quality
# component; Phase 5 penalises the overall final score)
# ---------------------------------------------------------------------------
career_multipliers:
  consulting_only_penalty:   0.40   # Entire career at consulting/services firms
  research_only_penalty:     0.50   # No engineering titles; pure researcher
  wrong_domain_penalty:      0.30   # CV/speech/robotics with no NLP/IR exposure

# ---------------------------------------------------------------------------
# Phase 5 — Soft penalties (multiplicative on final score)
# ---------------------------------------------------------------------------
soft_penalties:
  consistency_drop_per_contradiction:  0.15  # Per contradiction (skill/assessment)
  consistency_floor:                   0.30  # Min consistency_score
  title_velocity_mult:  0.80  # Avg tenure < 18mo across 3+ roles
  code_stopped_mult:    0.75  # Architect/VP/Director with YoE > 8
  langchain_only_mult:  0.45  # LangChain-only AI under 12 months, no pre-LLM ML
  remote_pref_mult:     0.85  # Prefers remote for a hybrid role
  research_only_mult:   0.40  # No engineering titles
  wrong_domain_mult:    0.50  # CV/speech/robotics without NLP/IR
  closed_source_mult:   0.80  # 5+ years no external validation

# ---------------------------------------------------------------------------
# Phase 5 — Behavioral reachability multipliers
# Applied multiplicatively on top of the Phase 4 final score
# ---------------------------------------------------------------------------
behavioral:
  # Inactivity multipliers
  inactive_heavy_days:    540   # > this many days → heavy penalty
  inactive_heavy_mult:    0.60
  inactive_moderate_days: 270  # > this many days → moderate penalty
  inactive_moderate_mult: 0.75

  # Open-to-work flag
  not_open_mult: 0.85          # Candidate is not flagged as open to work

  # Recruiter response rate
  low_response_rate_threshold: 0.10  # < this → penalty
  low_response_mult: 0.90

  # Notice period modifiers
  notice_ideal_days:    30     # <= this → no penalty
  notice_mild_days:     60     # <= this → mild penalty
  notice_moderate_days: 90    # <= this → moderate penalty
  notice_ideal_mult:    1.00
  notice_mild_mult:     0.95
  notice_moderate_mult: 0.90
  notice_bad_mult:      0.75  # > notice_moderate_days

  # Location modifiers
  location_pune_noida_mult:        1.00
  location_welcome_cities_mult:    1.00  # hyderabad, mumbai (with relocation)
  location_welcome_no_reloc:       0.98
  location_india_adjacent_mult:    0.98  # bangalore, chennai, etc. (with relocation)
  location_india_adjacent_no_reloc: 0.95
  location_india_willing_mult:     0.95
  location_india_no_reloc_mult:    0.92
  location_abroad_willing_mult:    0.90
  location_abroad_no_reloc_mult:   0.85

  # Combined multiplier floors
  logistical_floor:  0.75  # Logistics group cannot reduce score by > 25%
  combined_floor:    0.25  # Full chain cannot reduce score by > 75%

  # Honeypot kill switch (applied if impossible_flag or suspicious_flag == True)
  honeypot_multiplier: 0.01  # Forces score to ≤ 1.0 on 100.0 scale

  # Soft honeypot score compound penalty (non-flagged suspicious profiles)
  honeypot_score_penalty_factor: 0.40  # honeypot_mult = 1.0 - (score * this)

  # Additive bonuses
  ninety_day_bonus_max: 8.0   # ninety_day_alignment (0-1) * this

  # Floor for penalty_mult below which score is forced to 0.0
  penalty_floor_zero: 0.20

# ---------------------------------------------------------------------------
# Phase 5 — Social proof additive boosts
# These are additive points on the 100.0 score scale (not multipliers).
# ---------------------------------------------------------------------------
social_proof:
  github_threshold:         60     # github_activity_score > this to trigger
  github_boost:              4.0   # External validation: hard-to-fake signal
  saved_threshold:           5     # saved_by_recruiters_30d > this
  saved_boost:               3.0   # Market demand: other recruiters shortlisting
  endorsements_threshold:   20     # endorsements_received > this
  endorsements_boost:        1.0
  interview_completion_threshold: 0.80
  interview_completion_boost:     2.0
  offer_accept_threshold:   0.70   # offer_acceptance_rate > this
  offer_accept_boost:        1.0
  profile_completeness_threshold: 80
  profile_completeness_boost:     1.0
  linkedin_connected_boost:  1.0
  fast_response_threshold:   4.0   # avg_response_time_hours <= this
  fast_response_rate_min:    0.60  # also needs recruiter_response_rate >= this
  fast_response_boost:       1.0
  social_proof_max:         12.0   # Total cap on additive boosts

# ---------------------------------------------------------------------------
# Phase 2 — RRF retrieval configuration
# ---------------------------------------------------------------------------
retrieval:
  rrf_k: 60              # RRF denominator constant (standard = 60)
  runtime_top_k: 3000    # How many candidates to pass from retrieval to Phase 3/4

# ---------------------------------------------------------------------------
# Phase 1f — Honeypot soft scoring weights
# S-1 through S-6 correspond to the plan §5.5 soft signals
# ---------------------------------------------------------------------------
honeypot:
  s1_multi_current_roles:   0.40  # Multiple simultaneous is_current=True roles
  s2_yoe_mismatch:          0.25  # YoE mismatch > 24 months buffer
  s3_expert_short_duration: 0.15  # Expert skill with duration_months < 12 (per occurrence, cap 0.30)
  s4_maxed_signals:         0.20  # All redrob_signals simultaneously maxed
  s5_github_zero_senior:    0.15  # github_activity_score=0 with 8+ years claimed ML
  s6_uniform_descriptions:  0.10  # All career descriptions statistically uniform length
  suspicious_threshold:     0.70  # honeypot_score > this → suspicious_flag = True

# ---------------------------------------------------------------------------
# Version tracking
# ---------------------------------------------------------------------------
version: "1.1.0"
